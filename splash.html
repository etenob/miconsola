<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cargando miconsola...</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0f14;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .splash-container {
            position: relative;
            width: 400px;
            height: 450px;
            background: #111216;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .image-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            filter: brightness(0.8) contrast(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 60%, #111216 100%);
        }

        .content {
            padding: 20px 30px 40px;
            text-align: center;
            background: #111216;
        }

        .title {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        /* Barra de carga futurista */
        .loader-wrapper {
            position: relative;
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a855f7, #2dd4bf);
            box-shadow: 0 0 15px #a855f7;
            position: relative;
            animation: load 2.3s forwards cubic-bezier(0.65, 0.05, 0.36, 1);
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: sweep 1.5s infinite;
        }

        .status-text {
            margin-top: 12px;
            font-size: 10px;
            color: #2dd4bf;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            opacity: 0.8;
        }

        @keyframes load {
            0% {
                width: 0%;
            }

            20% {
                width: 15%;
            }

            50% {
                width: 60%;
            }

            80% {
                width: 95%;
            }

            100% {
                width: 100%;
            }
        }

        @keyframes sweep {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Escaneo visual */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(45, 212, 191, 0.2);
            box-shadow: 0 0 10px rgba(45, 212, 191, 0.5);
            animation: scan 3s infinite linear;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="splash-container">
        <div class="scanline"></div>
        <div class="image-container">
            <img src="loading.png" class="bg-image" alt="Mico Loading">
            <div class="overlay"></div>
        </div>
        <div class="content">
            <div class="title">miconsola</div>
            <div class="loader-wrapper">
                <div class="loader-bar"></div>
            </div>
            <div class="status-text">Iniciando Red Neuronal...</div>
        </div>
    </div>
</body>

</html>
